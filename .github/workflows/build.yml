name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: gradle build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: strengthsmp
          path: build/libs/strengthsmp-*.jar
          if-no-files-found: error
